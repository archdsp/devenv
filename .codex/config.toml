Write commit messages in Markdown format.

Before creating a commit:
- Run `git fetch --all --prune` or the narrowest appropriate `git fetch`.
- Inspect `git status` and the relevant diff.
- Perform a code-review pass focused on bugs, regressions, security risks, and missing tests.
- Resolve every actionable review finding before committing.
- Do not commit if fetch failed, review was skipped, findings remain unresolved, or required verification could not run.

For the commit message:
- Use a concise subject.
- Include a detailed Markdown body with summary, implementation notes, and verification.
- Keep the commit focused on the reviewed and resolved change set.
"""
