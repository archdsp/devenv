# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║ gpg-agent configuration (~/.gnupg/gpg-agent.conf)                         ║
# ║ Reload after changes:  gpg-connect-agent reloadagent /bye                 ║
# ║                                                                           ║
# ║ pinentry-program is OS-specific. The line below targets macOS.            ║
# ║ On Linux/Ubuntu run the `gpg_set_pinentry` shell function to switch it    ║
# ║ (e.g. /usr/bin/pinentry-curses).                                          ║
# ╚═══════════════════════════════════════════════════════════════════════════╝

# 1-day timeout
default-cache-ttl 86400
max-cache-ttl 86400

# SSH support
enable-ssh-support
default-cache-ttl-ssh 86400
max-cache-ttl-ssh 86400

pinentry-program /opt/homebrew/bin/pinentry-mac
